<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Constelación Serrana</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at top, #181818, #030303 70%);
      color: #f4f0e8;
      font-family: Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
    }

    }

    }
    p {
      font-size: 21px;

      margin-bottom: 42px;
    }
    a {
      display: inline-block;
      color: #fff;
      text-decoration: none;
      font-family: Arial, sans-serif;
      text-transform: uppercase;

      border-bottom: 1px solid #fff;
